<h1>Lista della spesa</h1>

<form (ngSubmit)="addItem()">
  <input
    [value]="newItem()"
    (input)="newItem.set($any($event.target).value)"
    placeholder="Es. Latte, Pane..."
    required
  />
  <button type="submit">Aggiungi</button>
</form>

@if (error()) {
  <p style="color: red;">{{ error() }}</p>
}

@if (items().length === 0) {
  <p>Nessun elemento nella lista.</p>
} @else {
  <ul>
    @for (el of items(); track el.id) {
      <li>
        {{ el.item }} 
        <button (click)="deleteItem(el.id)" style="margin-left: 10px;">Elimina</button>
      </li>
    }
  </ul>
}
